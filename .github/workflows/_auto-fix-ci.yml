name: Auto Fix CI Failure (Reusable)

on:
  workflow_call:
    inputs:
      run-id:
        description: "Failed workflow run ID"
        required: true
        type: number
      head-branch:
        description: "Branch that triggered the failure"
        required: true
        type: string
      head-sha:
        description: "Commit SHA that triggered the failure"
        required: true
        type: string
      pr-number:
        description: "PR number associated with the failure"
        required: true
        type: number
      workflow-name:
        description: "Name of the failed workflow"
        required: true
        type: string
    secrets:
      GH_PAT:
        required: false

permissions:
  contents: read
  pull-requests: write
  actions: write
  issues: write

jobs:
  retry-check:
    runs-on: ubuntu-latest
    outputs:
      should-fix: ${{ steps.check.outputs.should-fix }}
    steps:
      - name: Check Codex PR retry eligibility
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const branch = '${{ inputs.head-branch }}';
            const isCodex = branch.startsWith('codex/');

            if (!isCodex) {
              core.setOutput('should-fix', 'true');
              console.log('Not a Codex branch — proceeding to auto-fix');
              return;
            }

            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ inputs.run-id }},
            });

            const attempt = run.run_attempt || 1;
            console.log(`Codex PR CI: run #${run.id}, attempt ${attempt}`);

            if (attempt < 3) {
              await github.rest.actions.reRunWorkflowFailedJobs({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: ${{ inputs.run-id }},
              });
              console.log(`Retried failed jobs (attempt ${attempt} → ${attempt + 1}). Skipping auto-fix.`);
              core.setOutput('should-fix', 'false');
            } else {
              console.log(`Attempt ${attempt} — max retries (2) exceeded. Proceeding to auto-fix.`);
              core.setOutput('should-fix', 'true');
            }

  auto-fix:
    needs: retry-check
    if: needs.retry-check.outputs.should-fix == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Get failure logs
        id: logs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ inputs.run-id }},
            });

            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            let errorLogs = '';

            for (const job of failedJobs) {
              try {
                const logsResp = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                const lines = String(logsResp.data).split('\n');
                const tail = lines.slice(-100).join('\n');
                errorLogs += `\n--- Job: ${job.name} (${job.conclusion}) ---\n${tail}\n`;
              } catch (e) {
                errorLogs += `\n--- Job: ${job.name} ---\n[Could not retrieve logs: ${e.message}]\n`;
              }
            }

            // Truncate to fit GitHub comment limit (~65536 chars)
            if (errorLogs.length > 30000) {
              errorLogs = errorLogs.slice(-30000);
            }

            const fs = require('fs');
            fs.writeFileSync('/tmp/ci-failure-logs.txt', errorLogs);
            core.setOutput('failed_jobs', failedJobs.map(j => j.name).join(', '));
            core.setOutput('failed_count', String(failedJobs.length));

      - name: Post Codex auto-fix comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const fs = require('fs');
            const logs = fs.readFileSync('/tmp/ci-failure-logs.txt', 'utf8');

            const body = [
              '@codex Fix this CI failure.',
              '',
              '## CI Failure Context',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Workflow** | ${{ inputs.workflow-name }} |`,
              `| **Run** | [#${{ inputs.run-id }}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ inputs.run-id }}) |`,
              `| **Branch** | \`${{ inputs.head-branch }}\` |`,
              `| **Commit** | \`${{ inputs.head-sha }}\` |`,
              `| **Failed jobs** | ${{ steps.logs.outputs.failed_jobs }} |`,
              '',
              '## Instructions',
              '',
              '1. Read the CI failure logs below',
              '2. Identify the root cause of each failure',
              '3. Fix ONLY what is needed to make CI pass',
              '4. Do NOT refactor unrelated code',
              '5. Do NOT modify CI workflow files unless the workflow itself is broken',
              '6. Do NOT suppress errors with ignore comments or type casts',
              '7. Follow existing code patterns and conventions',
              '8. If the failure is infrastructure-related (network, secrets, runner), comment explaining why and do NOT make code changes',
              '',
              '## CI Failure Logs',
              '',
              '```',
              logs,
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr-number }},
              body: body,
            });
