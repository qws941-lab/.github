name: Sync Rulesets

on:
  push:
    branches: [master]
    paths:
      - 'scripts/sync-rulesets.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sync rulesets + repo settings
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: bash scripts/sync-rulesets.sh
