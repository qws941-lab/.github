# Reusable Codex Triage Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     triage:
#       uses: qws941/.github/.github/workflows/_codex-triage.yml@master

name: Codex Triage

on:
  workflow_call:

jobs:
  triage:
    name: Triage failure issues
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.issue.title, 'failed') ||
      contains(github.event.issue.title, 'failure') ||
      contains(github.event.issue.title, 'Failed') ||
      contains(github.event.issue.title, 'Failure') ||
      contains(github.event.issue.title, '[Deploy') ||
      contains(github.event.issue.title, '[Build') ||
      contains(github.event.issue.title, '[Docker') ||
      contains(github.event.issue.title, 'Apply failed')
    steps:
      - name: Comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `@codex Investigate this issue. Check recent commits, CI logs, and deployment status. Provide a root cause analysis and suggest fixes.\n\nTitle: ${context.payload.issue.title}\n\nBody:\n${context.payload.issue.body || '(no body)'}`
            });
